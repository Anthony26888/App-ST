events {
  worker_connections 1024;
}

http {
  include       mime.types;
  default_type  application/octet-stream;

  # Tối ưu hóa hiệu suất truyền file
  sendfile        on;
  keepalive_timeout  65;

  # Redirect từ HTTP sang HTTPS
  server {
    listen 80;
    server_name erp.sieuthuat.com erpst.io.vn; # Thêm cả domain io.vn nếu bạn đang dùng song song
    return 301 https://$host$request_uri;
  }

  server {
    listen 443 ssl;
    server_name erp.sieuthuat.com erpst.io.vn;

    ssl_certificate     /etc/nginx/certs/erp.sieuthuat.com.pem;
    ssl_certificate_key /etc/nginx/certs/erp.sieuthuat.com-key.pem;
    ssl_trusted_certificate /etc/nginx/certs/erp.sieuthuat.com-chain.pem;

    # Bảo mật SSL cơ bản
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    # Tăng giới hạn upload cho toàn bộ server
    client_max_body_size 50M;

    # 1. Cấu hình cho thư mục UPLOADS (Giải quyết lỗi 404 hình ảnh)
    location /uploads/ {
      proxy_pass http://backend:3000/uploads/; 
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;

      # Cache ảnh ở trình duyệt 30 ngày để web load nhanh hơn
      expires 30d;
      add_header Cache-Control "public, no-transform";
      
      # Tắt access log cho ảnh để đỡ rác log
      access_log off;
    }

    # 2. Cấu hình cho API
    location /api/ {
      proxy_pass http://backend:3000/api/;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection 'upgrade';
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_cache_bypass $http_upgrade;

      # Tối ưu cho upload file lớn qua API
      proxy_request_buffering off;
      proxy_buffering off;
      proxy_read_timeout 300;
      proxy_connect_timeout 300;
      proxy_send_timeout 300;
    }

    # 3. Cấu hình cho Frontend (Mặc định)
    location / {
      proxy_pass http://frontend:80;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection 'upgrade';
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_cache_bypass $http_upgrade;
    }
  }
}