events {}

http {

  server {
    listen 80;
    server_name erpst.io.vn;

    return 301 https://$host$request_uri;
  }

  server {
    listen 443 ssl;
    server_name erpst.io.vn;

    ssl_certificate /etc/nginx/certs/erp.sieuthuat.com.pem;
    ssl_certificate_key /etc/nginx/certs/erp.sieuthuat.com-key.pem;
    ssl_trusted_certificate /etc/nginx/certs/erp.sieuthuat.com-chain.pem;

    # Upload limit
    client_max_body_size 50M;

    # =========================
    # STATIC FILES (UPLOADS)
    # =========================
    location /uploads/ {
      proxy_pass http://backend:3000/uploads/;

      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;

      proxy_buffering off;
      proxy_request_buffering off;
    }

    # =========================
    # BACKEND API
    # =========================
    location /api/ {
      proxy_pass http://backend:3000/api/;

      proxy_http_version 1.1;

      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";

      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;

      proxy_cache_bypass $http_upgrade;

      # upload lớn
      proxy_request_buffering off;
      proxy_buffering off;

      proxy_busy_buffers_size 512k;
      proxy_buffers 8 512k;
      proxy_buffer_size 512k;

      # timeout
      proxy_connect_timeout 300;
      proxy_send_timeout 300;
      proxy_read_timeout 300;
      send_timeout 300;
    }

    # =========================
    # FRONTEND
    # =========================
    location / {
      proxy_pass http://frontend:80;

      proxy_http_version 1.1;

      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";

      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;

      proxy_cache_bypass $http_upgrade;
    }
  }
}
